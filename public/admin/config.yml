# Use DecapBridge classic auth (required)
backend:
  name: git-gateway
  repo: cortexx-bit/food-packaging-website
  branch: master
  identity_url: https://auth.decapbridge.com/sites/12ade3f8-39db-4927-ae8c-10960ef4ec59
  gateway_url: https://gateway.decapbridge.com

media_folder: "public/img/uploads"
public_folder: "/img/uploads"

collections:
  - name: "products"
    label: "Products"
    files:
      - name: "products_file"
        label: "All Products"
        file: "public/products.json"
        description: "Add, edit, and manage all products on the website here."
        fields:
          - name: "products"
            label: "Products"
            widget: "list"
            summary: "{{fields.sku}} — {{fields.name}}"
            fields:
              - { label: "SKU (Unique Product Code)", name: "sku", widget: "string", required: true, default: "KMZ-" }
              - { label: "Is this product in stock?", name: "in_stock", widget: "boolean", default: true }
              - { label: "Model Number (e.g., HP7); Used in URL path", name: "model_number", widget: "string", required: true }
              - { label: "Product Name", name: "name", widget: "string", required: true }

              - label: "Images"
                name: "images"
                widget: "object"
                fields:
                  - label: "Grid Image (for product cards)"
                    name: "grid_image"
                    widget: "object"
                    required: true
                    fields:
                      - { label: "Image File", name: "src", widget: "image" }
                      - { label: "Alt Text", name: "alt", widget: "string" }

                  - label: "Image Gallery"
                    name: "gallery_images"
                    widget: "list"
                    required: true
                    fields:
                      - { label: "Image File", name: "src", widget: "image" }
                      - { label: "Alt Text", name: "alt", widget: "string" }

              - label: "Categories"
                name: "categories"
                widget: "relation"
                collection: "categories"
                file: "categories_file"
                search_fields: ["categories.*.name", "categories.*.slug"]
                display_fields: ["categories.*.name"]
                value_field: "categories.*.slug"
                multiple: true
                required: true
              - { label: "Short Description (for product card)", name: "short_description", widget: "text", required: true }
              - { label: "Full Description", name: "full_description", widget: "markdown", required: true }

              - label: "Specifications"
                name: "specifications"
                widget: "object"
                fields:
                  - { label: "Raw Material", name: "raw_material", widget: "string", default: "Bagasse + Bamboo" }
                  - { label: "Capacity (ml)", name: "capacity_ml", widget: "number", value_type: "int", default: "/" }
                  - { label: "Weight (g)", name: "weight_g", widget: "number", value_type: "int", default: "/" }
                  - { label: "Open Size (mm)", name: "open_size_mm", widget: "string", default: "/" }
                  - { label: "Fold Size (mm)", name: "fold_size_mm", widget: "string", default: "/" }
  - name: "categories"
    label: "Categories"
    files:
      - name: "categories_file"
        label: "All Categories"
        file: "public/categories.json"
        description: "Add, edit, and manage all categories on the website here."
        fields:
          - name: "categories"
            label: "Categories"
            widget: "list"
            summary: "{{fields.slug}} — {{fields.name}}"
            fields:
              - { label: "Slug (used in URL path)", name: "slug", widget: "string", required: true }
              - { label: "Name", name: "name", widget: "string", required: true }
              - { label: "Description", name: "description", widget: "text", required: true }